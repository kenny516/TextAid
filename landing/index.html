<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Primary SEO -->
    <title>TextAid — Free AI Writing Assistant Browser Extension</title>
    <meta name="description"
        content="TextAid is a free, open-source AI browser extension for Chrome and Firefox. Summarize, rewrite, translate and expand any text on any webpage — powered by your own OpenAI or Gemini API key. No account required." />
    <meta name="keywords"
        content="AI writing assistant, browser extension, Chrome extension, Firefox extension, AI text summarizer, rewrite text AI, translate extension, Gemini extension, OpenAI extension, free AI extension, text summarizer, AI productivity" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://text-aid.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack…) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://text-aid.vercel.app/" />
    <meta property="og:site_name" content="TextAid" />
    <meta property="og:title" content="TextAid — Free AI Writing Assistant Browser Extension" />
    <meta property="og:description"
        content="Summarize, rewrite, translate and expand any text on any webpage — powered by your own OpenAI or Gemini key. Free, open-source, no account required." />
    <meta property="og:image" content="https://text-aid.vercel.app/icon-textaid.png" />
    <meta property="og:image:alt" content="TextAid extension icon" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="TextAid — Free AI Writing Assistant Browser Extension" />
    <meta name="twitter:description"
        content="Summarize, rewrite, translate and expand any text on any webpage — powered by your own OpenAI or Gemini key." />
    <meta name="twitter:image" content="https://text-aid.vercel.app/icon-textaid.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon-textaid.png" />
    <link rel="apple-touch-icon" href="/icon-textaid.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TextAid",
      "description": "A free, open-source AI browser extension. Summarize, rewrite, translate and expand any text on any webpage, powered by your own OpenAI or Gemini API key.",
      "url": "https://text-aid.vercel.app/",
      "downloadUrl": "https://text-aid.vercel.app/#install",
      "applicationCategory": "BrowserExtension",
      "applicationSubCategory": "Productivity",
      "operatingSystem": "Chrome, Firefox, Edge, Opera, Brave",
      "softwareVersion": "1.2.0",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Summarize text with AI",
        "Rewrite text with multiple tones",
        "Translate to 16 languages",
        "Expand sentences into paragraphs",
        "Supports OpenAI GPT models",
        "Supports Google Gemini models",
        "Works on any webpage"
      ],
      "screenshot": "https://text-aid.vercel.app/icon-textaid.png",
      "creator": {
        "@type": "Person",
        "name": "kenny516",
        "url": "https://github.com/kenny516"
      },
      "codeRepository": "https://github.com/kenny516/TextAid",
      "license": "https://opensource.org/licenses/MIT"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <script>
        (function () {
            try {
                var saved = localStorage.getItem("textaid-theme");
                if (saved === "light") {
                    document.documentElement.classList.add("light");
                    var m = document.querySelector('meta[name="theme-color"]');
                    if (m) m.setAttribute("content", "#fafafa");
                }
            } catch (e) { /* ignore */ }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
