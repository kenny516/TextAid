name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build deps
        run: npm ci || npm install

      - name: Build extension (chrome + firefox)
        run: npm run build

      - name: Read version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts (stable, version-less aliases)
        run: |
          cp dist/textaid-chrome-${{ steps.version.outputs.version }}.zip  dist/textaid-chrome.zip
          cp dist/textaid-firefox-${{ steps.version.outputs.version }}.zip dist/textaid-firefox.zip

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No notes found for $version, falling back to git log."
            git log -1 --pretty=%B > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TextAid v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            dist/textaid-chrome.zip
            dist/textaid-firefox.zip
            dist/textaid-chrome-${{ steps.version.outputs.version }}.zip
            dist/textaid-firefox-${{ steps.version.outputs.version }}.zip
