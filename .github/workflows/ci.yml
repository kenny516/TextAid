name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Lint & Basic Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install linters (if package.json exists)
        run: |
          if [ -f package.json ]; then npm ci || true; fi

      - name: Run basic syntax check
        run: |
          # If there is package.json and an npm script 'lint', run it
          if [ -f package.json ] && npm run | grep -q lint; then
            npm run lint
          else
            # Fallback: run a simple Node syntax check on .js files
            find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node -c || true
          fi
