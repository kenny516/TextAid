<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextAid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
  />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="ta-app">
    <header class="ta-header">
      <div class="ta-brand">
        <span class="ta-logo" aria-hidden="true"></span>
        <span class="ta-wordmark">TextAid</span>
      </div>
      <kbd class="ta-shortcut" id="shortcutHint" title="Keyboard shortcut to open the toolbar"></kbd>
    </header>

    <section class="ta-section">
      <div class="ta-row-label">Provider</div>
      <div class="ta-segmented" role="tablist">
        <button class="ta-seg" data-provider="gemini" role="tab" aria-selected="true">Gemini</button>
        <button class="ta-seg" data-provider="openai" role="tab" aria-selected="false">OpenAI</button>
        <span class="ta-seg-indicator" aria-hidden="true"></span>
      </div>
    </section>

    <section class="ta-section">
      <div class="ta-row-label">API key</div>
      <div class="ta-input-row">
        <input
          type="password"
          id="apiKey"
          class="ta-input"
          placeholder="AIza..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="ta-btn-ghost" id="testKey">Test</button>
      </div>
      <div class="ta-status" id="statusRow">
        <span class="ta-dot ta-dot--idle" id="statusDot"></span>
        <span class="ta-status-text" id="statusText">Idle</span>
      </div>
      <div class="ta-status-error" id="statusError" hidden></div>
    </section>

    <section class="ta-section">
      <div class="ta-row-label">Model</div>
      <div class="ta-custom-select" id="modelSelect" data-id="model"></div>
    </section>

    <section class="ta-section">
      <div class="ta-row-label">Tone</div>
      <div class="ta-custom-select" id="toneSelect" data-id="tone"></div>
    </section>

    <section class="ta-section ta-section--toggles">
      <div class="ta-toggle-row">
        <div class="ta-toggle-meta">
          <div class="ta-toggle-name">Floating toolbar</div>
          <div class="ta-toggle-desc">Appears on text selection.</div>
        </div>
        <label class="ta-switch">
          <input type="checkbox" id="enableFloatingToolbar" />
          <span class="ta-switch-track"></span>
        </label>
      </div>
      <div class="ta-toggle-row">
        <div class="ta-toggle-meta">
          <div class="ta-toggle-name">Context menu</div>
          <div class="ta-toggle-desc">Right-click actions.</div>
        </div>
        <label class="ta-switch">
          <input type="checkbox" id="enableContextMenu" />
          <span class="ta-switch-track"></span>
        </label>
      </div>
      <div class="ta-toggle-row">
        <div class="ta-toggle-meta">
          <div class="ta-toggle-name">Inline suggestions</div>
          <div class="ta-toggle-desc">Ghost completions while typing.</div>
        </div>
        <label class="ta-switch">
          <input type="checkbox" id="enableSuggestions" />
          <span class="ta-switch-track"></span>
        </label>
      </div>
    </section>

    <section class="ta-section">
      <div class="ta-row-label">Recent</div>
      <ul class="ta-history" id="historyList">
        <li class="ta-history-empty" id="historyEmpty">
          Nothing yet — select text on any page to get started.
        </li>
      </ul>
    </section>

    <div class="ta-actions">
      <button class="ta-btn-primary" id="saveSettings">
        <span class="ta-btn-label">Save</span>
      </button>
    </div>

    <footer class="ta-footer">
      <span class="ta-foot-caption">v1.1.0 · Open source</span>
      <a class="ta-foot-link" id="ghLink" href="https://github.com/kenny516/TextAid" target="_blank" rel="noopener">
        GitHub<span class="ta-foot-link-icon" id="iconExternal" aria-hidden="true"></span>
      </a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
