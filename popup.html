<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextAid Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <!-- Header -->
        <header class="popup-header">
            <h1 class="popup-title">TextAid</h1>
            <svg class="settings-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                </path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
        </header>

        <!-- AI Provider Section -->
        <section class="section">
            <div class="section-title">
                🤖 AI Provider
            </div>
            <div class="card">
                <div class="toggle-group">
                    <div class="toggle-option active" data-provider="openai">
                        OpenAI
                    </div>
                    <div class="toggle-option" data-provider="gemini">
                        Gemini
                    </div>
                </div>
            </div>
        </section>

        <!-- API Configuration Section -->
        <section class="section">
            <div class="section-title">
                🔑 API Configuration
            </div>
            <div class="card">
                <div class="input-group">
                    <label class="input-label" for="apiKey">API Key</label>
                    <input type="password" id="apiKey" class="input" placeholder="Enter your API key..."
                        autocomplete="off" />
                </div>
                <div class="status-indicator status-disconnected" id="connectionStatus">
                    Disconnected
                </div>
            </div>
        </section>

        <!-- Features Section -->
        <section class="section">
            <div class="section-title">
                ⚡ Features
            </div>
            <div class="card">
                <div class="feature-toggle">
                    <div class="feature-info">
                        <div class="feature-name">Text Summarization</div>
                        <div class="feature-desc text-gray-500">Summarize selected text</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="enableSummary" checked>
                        <span class="switch-slider"></span>
                    </label>
                </div>

                <div class="feature-toggle">
                    <div class="feature-info">
                        <div class="feature-name">Context Menu</div>
                        <div class="feature-desc text-gray-500">Right-click options</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="enableContextMenu" checked>
                        <span class="switch-slider"></span>
                    </label>
                </div>

                <div class="feature-toggle">
                    <div class="feature-info">
                        <div class="feature-name">Floating Toolbar</div>
                        <div class="feature-desc text-gray-500">Quick access buttons</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="enableFloatingToolbar" checked>
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>
        </section>

        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-primary" id="saveSettings">
                Save Settings
            </button>
        </div>

        <!-- Status Message -->
        <div id="statusMessage" class="status-message" style="display: none;"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
